<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Post-it</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <main class="stage">
      <div class="board-wrap">
        <div id="board" class="board"></div>
        <button id="add-postit" type="button" class="add-postit">
          + Añadir post-it <span id="postit-count" class="postit-count"></span>
        </button>
      </div>
    </main>

    <template id="postit-template">
      <div class="postit">
        <textarea class="content" placeholder="Escribe algo…" maxlength="5000"></textarea>
        <div class="toolbar">
          <div class="colors">
            <button type="button" class="swatch" data-color="yellow" title="Amarillo"></button>
            <button type="button" class="swatch" data-color="pink" title="Rosa"></button>
            <button type="button" class="swatch" data-color="blue" title="Azul"></button>
            <button type="button" class="swatch" data-color="green" title="Verde"></button>
            <button type="button" class="swatch" data-color="orange" title="Naranja"></button>
            <button type="button" class="swatch" data-color="purple" title="Morado"></button>
          </div>
          <span class="status"></span>
          <button type="button" class="clear">Borrar</button>
        </div>
      </div>
    </template>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
